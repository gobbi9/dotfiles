[custom.gradle_root_project]
description = "Show rootProject.name and root project version via Gradle wrapper (cached, non-blocking)"
when = '''
root=""
if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
  root=$(git rev-parse --show-toplevel 2>/dev/null)
fi
if [ -n "$root" ] && [ -x "$root/gradlew" ]; then
  exit 0
fi
[ -x ./gradlew ]
'''
command = '''
root=""
if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
  root=$(git rev-parse --show-toplevel 2>/dev/null)
fi

if [ -n "$root" ] && [ -x "$root/gradlew" ]; then
  cd "$root" || exit 1
elif [ -x ./gradlew ]; then
  root=$(pwd)
else
  exit 1
fi

cache_root="${STARSHIP_CACHE:-$HOME/.cache/starship}"
mkdir -p "$cache_root" 2>/dev/null || true

key=$(printf "%s" "$root" | cksum | awk '{print $1}')
cache_file="$cache_root/gradle-root-project-${key}.txt"
lock_file="$cache_root/gradle-root-project-${key}.lock"

ttl=300
now=$(date +%s)
mtime=$(stat -f %m "$cache_file" 2>/dev/null || stat -c %Y "$cache_file" 2>/dev/null || echo 0)
age=$((now - mtime))

# Print cached value immediately if present
if [ -s "$cache_file" ]; then
  cat "$cache_file"
fi

# Refresh in background if cache is missing/stale and no refresh is in progress
if [ ! -s "$cache_file" ] || [ "$age" -gt "$ttl" ]; then
  if [ ! -e "$lock_file" ]; then
    : > "$lock_file"
    (
      props=$(./gradlew -q properties --no-daemon 2>/dev/null)
      name=$(printf "%s\n" "$props" | sed -nE 's/^name:[[:space:]]+(.+)$/\1/p' | head -n1)
      version=$(printf "%s\n" "$props" | sed -nE 's/^version:[[:space:]]+(.+)$/\1/p' | head -n1)
      if [ -n "$name" ] && [ -n "$version" ]; then
        tmp_file="$cache_file.tmp"
        printf "%s v%s" "$name" "$version" > "$tmp_file" && mv "$tmp_file" "$cache_file"
      fi
      rm -f "$lock_file"
    ) >/dev/null 2>&1 &
  fi
fi

# Module is shown only when cache has something to display
[ -s "$cache_file" ] || exit 1
'''
