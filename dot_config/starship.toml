[custom.kotlin_gradle]
description = "Kotlin version from Gradle project config"
detect_files = ["settings.gradle.kts", "settings.gradle", "build.gradle.kts", "build.gradle", "gradle/libs.versions.toml", "gradle/libs.toml"]
when = "test -f settings.gradle.kts || test -f settings.gradle || test -f build.gradle.kts || test -f build.gradle || test -f gradle/libs.versions.toml || test -f gradle/libs.toml"
command = '''
v=""
catalog=""

# Resolve custom catalog path from settings.gradle(.kts), e.g. from(files("gradle/libs.toml"))
for f in settings.gradle.kts settings.gradle; do
  if [ -f "$f" ]; then
    catalog=$(sed -nE "s/.*from\(files\([\"']([^\"']+)[\"']\)\).*/\1/p" "$f" | head -n1)
    [ -n "$catalog" ] && break
  fi
done

# Try version catalogs first (custom path, then common defaults)
for c in "$catalog" gradle/libs.versions.toml gradle/libs.toml; do
  [ -n "$c" ] || continue
  [ -f "$c" ] || continue

  # Prefer explicit version keys from [versions]
  kv=$(grep -E '^[[:space:]]*kotlinVersion[[:space:]]*=' "$c" | head -n1 | sed -E "s/.*[\"']([^\"']+)[\"'].*/\1/")
  if [ -z "$kv" ]; then
    kv=$(grep -E '^[[:space:]]*kotlin[[:space:]]*=' "$c" | head -n1 | sed -E "s/.*[\"']([^\"']+)[\"'].*/\1/")
  fi

  # [plugins] entries for org.jetbrains.kotlin* with direct version = "x.y.z"
  if [ -z "$kv" ]; then
    kv=$(grep -E '^[[:space:]]*[^=]+=[[:space:]]*\{[^}]*id[[:space:]]*=[[:space:]]*"org\.jetbrains\.kotlin[^\"]*"[^}]*version[[:space:]]*=[[:space:]]*"[^"]+"' "$c" | head -n1 | sed -E 's/.*version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
  fi

  # [plugins] entries for org.jetbrains.kotlin* with version.ref = "..."
  if [ -z "$kv" ]; then
    ref=$(grep -E '^[[:space:]]*[^=]+=[[:space:]]*\{[^}]*id[[:space:]]*=[[:space:]]*"org\.jetbrains\.kotlin[^\"]*"[^}]*version[[:space:]]*\.[[:space:]]*ref[[:space:]]*=[[:space:]]*"[^"]+"' "$c" | head -n1 | sed -E 's/.*version[[:space:]]*\.[[:space:]]*ref[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
    if [ -n "$ref" ]; then
      kv=$(grep -E "^[[:space:]]*$ref[[:space:]]*=" "$c" | head -n1 | sed -E "s/.*[\"']([^\"']+)[\"'].*/\1/")
    fi
  fi

  if [ -n "$kv" ]; then
    v="$kv"
    break
  fi
done

# Fallback: Kotlin plugin declared directly in build scripts
if [ -z "$v" ] && [ -f build.gradle.kts ]; then
  v=$(grep -E 'kotlin\("[^"]+"\)[[:space:]]+version[[:space:]]+"[^"]+"|id\("org\.jetbrains\.kotlin[^\"]*"\)[[:space:]]+version[[:space:]]+"[^"]+"' build.gradle.kts | head -n1 | sed -E 's/.*version[[:space:]]+"([^"]+)".*/\1/')
fi

if [ -z "$v" ] && [ -f build.gradle ]; then
  v=$(grep -E 'id[[:space:]]+"org\.jetbrains\.kotlin[^\"]*"[[:space:]]+version[[:space:]]+"[^"]+"' build.gradle | head -n1 | sed -E 's/.*version[[:space:]]+"([^"]+)".*/\1/')
fi

[ -n "$v" ] || exit 1
printf "v%s" "$v"
'''
