"$schema" = 'https://starship.rs/config-schema.json'

scan_timeout = 5000  # increase from default 30ms
command_timeout = 5000

format = """
$username\
$hostname\
$localip\
$shlvl\
$singularity\
$kubernetes\
$nats\
$directory\
$vcsh\
$fossil_branch\
$fossil_metrics\
$git_branch\
$git_commit\
${custom.git_tags}\
$git_state\
$git_metrics\
$git_status\
${custom.chezmoi_diff}\
$hg_branch\
$hg_state\
$pijul_channel\
${custom.gradle_root_project}\
${custom.rust_workspace_packages}\
$package\
$docker_context\
$bun\
$c\
$cmake\
$cobol\
$cpp\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$fortran\
$gleam\
$golang\
$gradle\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$lua\
$maven\
$mojo\
$nim\
$nodejs\
$ocaml\
$odin\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$quarto\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$terraform\
$typst\
$vlang\
$vagrant\
$xmake\
$zig\
$buf\
$guix_shell\
$nix_shell\
$conda\
$pixi\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$direnv\
$env_var\
$crystal\
${custom.mise_python}\
${custom.kotlin_gradle}\
$mise\
${custom.overlay_commands_indicator}\
$line_break\
$sudo\
$jobs\
$battery\
$time\
$status\
$container\
$netns\
$os\
$shell\
$cmd_duration\
$character
"""

[aws]
format = '[$symbol($profile)(\($region\))($duration)]($style) '
symbol = " "

[azure]
format = '[$symbol($subscription)]($style) '
symbol = " "

[battery]
format = '[$symbol$percentage]($style) '
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
unknown_symbol = "󰂑 "
empty_symbol = "󰂎 "

[buf]
format = '[$symbol($version)]($style) '
symbol = " "

[bun]
format = '[$symbol($version)]($style) '
symbol = " "

[c]
format = '[$symbol($version(-$name))]($style) '
symbol = " "

[cmake]
format = '[$symbol($version)]($style) '
symbol = " "

[cmd_duration]
format = '[⏱ $duration]($style) '
show_milliseconds = true
min_time = 0

[cobol]
format = '[$symbol($version)]($style) '
symbol = " "

[conda]
format = '[$symbol$environment]($style) '
symbol = " "

[container]
format = '[$symbol $name]($style) '
symbol = " "

[cpp]
format = '[$symbol($version(-$name))]($style) '
symbol = " "

[crystal]
format = '[$symbol($version)]($style) '
symbol = " "

[daml]
format = '[$symbol($version)]($style) '

[dart]
format = '[$symbol($version)]($style) '
symbol = " "

[deno]
format = '[$symbol($version)]($style) '
symbol = " "

[directory]
read_only = " 󰌾"

[direnv]
format = '[$symbol$loaded/$allowed]($style) '
symbol = " "

[docker_context]
format = '[$symbol$context]($style) '
symbol = " "

[dotnet]
format = '[$symbol($version)(🎯 $tfm)]($style) '
symbol = " "

[elixir]
format = '[$symbol($version \(OTP $otp_version\))]($style) '
symbol = " "

[elm]
format = '[$symbol($version)]($style) '
symbol = " "

[erlang]
format = '[$symbol($version)]($style) '
symbol = " "

[fennel]
format = '[$symbol($version)]($style) '
symbol = " "

[fortran]
format = '[$symbol($version)]($style) '
symbol = " "

[fossil_branch]
format = '[$symbol$branch]($style) '
symbol = " "

[fossil_metrics]
format = '[+$added]($added_style)[-$deleted]($deleted_style) '

[gcloud]
format = '[$symbol$account(@$domain)(\($region\))]($style) '
symbol = "󱇶 "

[git_branch]
format = '[$symbol$branch(:$remote_name/$remote_branch)]($style) '
symbol = " "
always_show_remote = true

[git_commit]
format = '[ $hash]($style) '
only_detached = false

[git_metrics]
format = '[+$added]($added_style)[-$deleted]($deleted_style) '

[git_state]
format = '[$state ($progress_current/$progress_total)]($style) '

[git_status]
format = '([$all_status$ahead_behind]($style) )'
modified = '!${count}'
staged = '+${count}'
untracked = '?${count}'
renamed = '»${count}'
deleted = '✘${count}'
stashed = '\$${count}'
conflicted = '=${count}'
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'

[gleam]
format = '[$symbol($version)]($style) '
symbol = " "

[golang]
format = '[$symbol($version)]($style) '
symbol = " "

[gradle]
format = '[$symbol($version)]($style) '
symbol = " "

[guix_shell]
format = '[$symbol]($style) '
symbol = " "

[haskell]
format = '[$symbol($version)]($style) '
symbol = " "

[haxe]
format = '[$symbol($version)]($style) '
symbol = " "

[helm]
format = '[$symbol($version)]($style) '
symbol = " "

[hg_branch]
format = '[$symbol$branch]($style) '
symbol = " "

[hostname]
format = '[$ssh_symbol($hostname)]($style) '
ssh_symbol = " "

[java]
format = '[$symbol($version)]($style) '
style = 'bold bright-red'
symbol = " "

[jobs]
format = '[$symbol$number]($style) '

[julia]
format = '[$symbol($version)]($style) '
symbol = " "

[kotlin]
disabled = true

[kubernetes]
format = '[$symbol$context( \($namespace\))]($style) '
symbol = "󱃾 "

[localip]
format = '[$localipv4]($style) '

[lua]
format = '[$symbol($version)]($style) '
symbol = " "

[maven]
format = '[$symbol($version)]($style) '
symbol = " "

[memory_usage]
format = '$symbol[$ram( | $swap)]($style) '
symbol = "󰍛 "

[meson]
format = '[$symbol$project]($style) '
symbol = "󰔷 "

[mise]
disabled = false
format = '[$symbol$health]($style) '
symbol = "󰬔 "
healthy_symbol = "󰋑"
unhealthy_symbol = "󰋔"

[custom.overlay_commands_indicator]
description = "Show overlay commands count indicator when overlay.nu exports are present"
when = '([($env.PWD | default ".") "overlay.nu"] | path join | path exists)'
command = 'source ($nu.home-dir | path join ".config" "starship" "overlay_commands_indicator.nu"); overlay-commands-indicator-command'
format = '[$output]($style) '
style = "bright-blue"
shell = ["/opt/homebrew/bin/nu", "-l", "-c"]

[mojo]
format = '[$symbol($version)]($style) '
symbol = "󰈸 "

[nats]
format = '[$symbol$name]($style) '
symbol = " "

[netns]
format = '[$symbol $name]($style) '
symbol = "󰛳 "

[nim]
format = '[$symbol($version)]($style) '
symbol = " "

[nix_shell]
format = '[$symbol$state( \($name\))]($style) '
symbol = " "

[nodejs]
format = '[$symbol($version)]($style) '
symbol = " "

[ocaml]
format = '[$symbol($version)(\($switch_indicator$switch_name\))]($style) '
symbol = " "

[odin]
format = '[$symbol($version)]($style) '
symbol = "󰟢 "

[opa]
format = '[$symbol($version)]($style) '
symbol = " "

[openstack]
format = '[$symbol$cloud(\($project\))]($style) '
symbol = " "

[os]
format = '[$symbol]($style) '

[os.symbols]
AIX = " "
AlmaLinux = " "
Alpaquita = " "
Alpine = " "
ALTLinux = " "
Amazon = " "
Android = " "
AOSC = " "
Arch = " "
Artix = " "
Bluefin = " "
CachyOS = " "
CentOS = " "
Debian = " "
DragonFly = " "
Elementary = " "
Emscripten = " "
EndeavourOS = " "
Fedora = " "
FreeBSD = " "
Garuda = " "
Gentoo = " "
HardenedBSD = "󰞌 "
Illumos = " "
InstantOS = " "
Ios = "󰀷 "
Kali = " "
Linux = " "
Mabox = " "
Macos = " "
Manjaro = " "
Mariner = " "
MidnightBSD = " "
Mint = " "
NetBSD = " "
NixOS = " "
Nobara = " "
OpenBSD = " "
OpenCloudOS = " "
openEuler = " "
openSUSE = " "
OracleLinux = "󰺡 "
PikaOS = " "
Pop = " "
Raspbian = " "
Redhat = "󱄛 "
RedHatEnterprise = "󱄛 "
Redox = "󰀘 "
RockyLinux = " "
Solus = " "
SUSE = " "
Ubuntu = " "
Ultramarine = " "
Unknown = " "
Uos = " "
Void = " "
Windows = "󰍲 "
Zorin = " "

[package]
format = '[$symbol$version]($style) '
symbol = "󰏗 "
style = "bold bright-black"

[custom.rust_workspace_packages]
description = "Show all Rust workspace packages with versions"
when = 'source ($nu.home-dir | path join ".config" "starship" "rust_workspace_packages.nu"); rust-workspace-packages-when'
command = 'source ($nu.home-dir | path join ".config" "starship" "rust_workspace_packages.nu"); rust-workspace-packages-command'
format = "[$output]($style) "
style = "bold bright-black"
ignore_timeout = true
shell = ["/opt/homebrew/bin/nu", "-l", "-c"]

[perl]
format = '[$symbol($version)]($style) '
symbol = " "

[php]
format = '[$symbol($version)]($style) '
symbol = " "

[pijul_channel]
format = '[$symbol$channel]($style) '
symbol = " "

[pixi]
format = '[$symbol$version( $environment)]($style) '
symbol = "󰏗 "

[pulumi]
format = '[$symbol$stack]($style) '
symbol = " "

[purescript]
format = '[$symbol($version)]($style) '
symbol = " "

[python]
# it sets the python version even if the requirements.txt is nested 10 ways in
format = '[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style) '
disabled = true
symbol = " "

[custom.gradle_root_project]
description = "Show Gradle root project name and version"
when = 'source ($nu.home-dir | path join ".config" "starship" "gradle_root_project.nu"); gradle-root-project-when'
command = 'source ($nu.home-dir | path join ".config" "starship" "gradle_root_project.nu"); gradle-root-project-command'
format = '([$output]($style)) '
style = "bold bright-black"
shell = ["/opt/homebrew/bin/nu", "-l", "-c"]

[custom.mise_python]
detect_extensions = ["py"]
detect_files = [".python-version", "pyproject.toml", "requirements.txt", "requirements-dev.txt", "Pipfile", "poetry.lock", "uv.lock", "setup.py"]
when = 'source ($nu.home-dir | path join ".config" "starship" "mise_python.nu"); mise-python-when'
command = 'source ($nu.home-dir | path join ".config" "starship" "mise_python.nu"); mise-python-command'
format = "[$output]($style) "
style = "bold yellow"
shell = ["/opt/homebrew/bin/nu", "-l", "-c"]

[custom.git_tags]
description = "Show tags on HEAD and the most recent previous tagged commit"
when = 'source ($nu.home-dir | path join ".config" "starship" "git_tags.nu"); git-tags-when'
command = 'source ($nu.home-dir | path join ".config" "starship" "git_tags.nu"); git-tags-command'
format = '([$output]($style) )'
style = "bold yellow"
shell = ["/opt/homebrew/bin/nu", "-l", "-c"]

[custom.chezmoi_diff]
description = "Show chezmoi target/source differences"
when = 'source ($nu.home-dir | path join (($nu.vendor-autoload-dirs | get 0) | str replace -r "^/" "") "chezmoi-ext.nu"); chezmoi-ext-starship-when'
command = 'source ($nu.home-dir | path join (($nu.vendor-autoload-dirs | get 0) | str replace -r "^/" "") "chezmoi-ext.nu"); chezmoi-ext-starship-command'
format = '([$output]($style) )'
style = "bold blue"
shell = ["/opt/homebrew/bin/nu", "-l", "-c"]

[custom.kotlin_gradle]
description = "Kotlin version from Gradle project config"
detect_extensions = ["kt", "kts"]
detect_files = ["settings.gradle.kts", "settings.gradle", "build.gradle.kts", "build.gradle", "gradle/libs.versions.toml", "gradle/libs.toml"]
command = 'source ($nu.home-dir | path join ".config" "starship" "kotlin_gradle.nu"); kotlin-gradle-command'
format = '([$output]($style)) '
style = "bold blue"
shell = ["/opt/homebrew/bin/nu", "-l", "-c"]

[quarto]
format = '[$symbol($version)]($style) '

