format = '([$output]($style)) '
style = "bold white"
shell = ["/opt/homebrew/bin/nu", "-l", "-c"]

[custom.mise_python]
detect_extensions = ["py"]
detect_files = [".python-version", "pyproject.toml", "requirements.txt", "requirements-dev.txt", "Pipfile", "poetry.lock", "uv.lock", "setup.py"]
when = 'source ($nu.home-dir | path join ".config" "starship" "mise_python.nu"); mise-python-when'
command = 'source ($nu.home-dir | path join ".config" "starship" "mise_python.nu"); mise-python-command'
shell = ["/opt/homebrew/bin/nu", "-l", "-c"]
format = "[$output]($style) "
style = "yellow bold"

[custom.git_tags]
description = "Show tags on HEAD and the most recent previous tagged commit"
when = 'source ($nu.home-dir | path join ".config" "starship" "git_tags.nu"); git-tags-when'
command = 'source ($nu.home-dir | path join ".config" "starship" "git_tags.nu"); git-tags-command'
format = '([$output]($style) )'
style = "yellow bold"
shell = ["/opt/homebrew/bin/nu", "-l", "-c"]

[custom.kotlin_gradle]
description = "Kotlin version from Gradle project config"
detect_extensions = ["kt", "kts"]
detect_files = ["settings.gradle.kts", "settings.gradle", "build.gradle.kts", "build.gradle", "gradle/libs.versions.toml", "gradle/libs.toml"]
command = 'source ($nu.home-dir | path join ".config" "starship" "kotlin_gradle.nu"); kotlin-gradle-command'
format = '([$output]($style)) '
style = "bold blue"
shell = ["/opt/homebrew/bin/nu", "-l", "-c"]

