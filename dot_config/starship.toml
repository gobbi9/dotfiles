[custom.git_tags]
description = "Show tags on HEAD and the most recent previous tagged commit"
when = '''
let git_repo = (^git rev-parse --is-inside-work-tree | complete)
if $git_repo.exit_code == 0 {
  exit 0
}

exit 1
'''
command = '''
let head_tags = (^git tag --points-at HEAD --sort=-creatordate | lines | where {|line| $line != ""} | str join ",")

let start_ref = if ($head_tags == "") {
  "HEAD"
} else {
  let head_prev = (^git rev-parse --verify HEAD^ | complete)
  if $head_prev.exit_code == 0 {
    $head_prev.stdout | str trim
  } else {
    ""
  }
}

mut prev_tags = ""
if ($start_ref != "") {
  let nearest_tag_result = (^git describe --tags --abbrev=0 --first-parent $start_ref | complete)
  if $nearest_tag_result.exit_code == 0 {
    let nearest_tag = ($nearest_tag_result.stdout | str trim)
    if $nearest_tag != "" {
      let commit_result = (^git rev-list -n 1 $nearest_tag | complete)
      if $commit_result.exit_code == 0 {
        let tag_commit = ($commit_result.stdout | str trim)
        if $tag_commit != "" {
          $prev_tags = (^git tag --points-at $tag_commit --sort=-creatordate | lines | where {|line| $line != ""} | str join ",")
        }
      }
    }
  }
}

mut out = ""
if ($prev_tags != "") {
  $out = $"󰋚 ($prev_tags)"
}
if ($head_tags != "") {
  if ($out != "") {
    $out = $"($out)  ($head_tags)"
  } else {
    $out = $" ($head_tags)"
  }
}
if ($out == "") {
  $out = "󱈠·"
}

$out
'''
format = '([$output]($style) )'
style = "yellow bold"
shell = ["/opt/homebrew/bin/nu", "-l", "-c"]

[custom.kotlin_gradle]
description = "Kotlin version from Gradle project config"
detect_extensions = ["kt", "kts"]
detect_files = ["settings.gradle.kts", "settings.gradle", "build.gradle.kts", "build.gradle", "gradle/libs.versions.toml", "gradle/libs.toml"]
command = '''
def get-kotlin-version-from-catalog [catalog_path: string] {
  if (not ($catalog_path | path exists)) {
    return ""
  }

  let catalog = (try { openn $catalog_path } catch { null })
  if $catalog == null {
    return ""
  }

  let versions = ($catalog.versions? | default {})
  if (($versions | columns) | any {|c| $c == "kotlinVersion"}) {
    return ($versions.kotlinVersion | into string)
  }
  if (($versions | columns) | any {|c| $c == "kotlin"}) {
    return ($versions.kotlin | into string)
  }

  let plugins = ($catalog.plugins? | default {})
  for key in ($plugins | columns) {
    let plugin = ($plugins | get $key)
    let plugin_id = ($plugin.id? | default "" | into string)
    if not ($plugin_id | str starts-with "org.jetbrains.kotlin") {
      continue
    }

    let direct = ($plugin.version? | default "")
    if $direct != "" {
      return ($direct | into string)
    }

    let ref_key = ($plugin.version.ref? | default "")
    if $ref_key != "" {
      let ref_version = ($versions | get -o $ref_key)
      if $ref_version != null {
        return ($ref_version | into string)
      }
    }
  }

  ""
}

def get-kotlin-version-from-build-script [path: string] {
  if (not ($path | path exists)) {
    return ""
  }

  let lines = (openn $path | lines)
  let candidates = ($lines | where {|line|
    ($line =~ 'kotlin\("[^"]+"\)\s+version\s+"[^"]+"')
    or ($line =~ 'id\("org\.jetbrains\.kotlin[^"]*"\)\s+version\s+"[^"]+"')
    or ($line =~ 'id\s+"org\.jetbrains\.kotlin[^"]*"\s+version\s+"[^"]+"')
  })

  if (($candidates | length) == 0) {
    return ""
  }

  let parsed = (($candidates | first) | parse -r '.*version\s+"(?<value>[^"]+)".*')
  if (($parsed | length) == 0) {
    return ""
  }

  $parsed | get 0.value
}

mut version = ""
mut catalog = ""

for f in ["settings.gradle.kts", "settings.gradle"] {
  if not ($f | path exists) {
    continue
  }

  let matches = (openn $f | lines | where {|line| $line =~ 'from\(files\(["'"'"'][^"'"'"']+["'"'"']\)\)'})
  if (($matches | length) == 0) {
    continue
  }

  let parsed = (($matches | first) | parse -r '.*from\(files\(["'"'"'](?<path>[^"'"'"']+)["'"'"']\)\).*')
  if (($parsed | length) > 0) {
    $catalog = ($parsed | get 0.path)
    break
  }
}

for c in [$catalog, "gradle/libs.versions.toml", "gradle/libs.toml"] {
  if $c == "" {
    continue
  }
  let found = (get-kotlin-version-from-catalog $c)
  if $found != "" {
    $version = $found
    break
  }
}

if $version == "" {
  $version = (get-kotlin-version-from-build-script "build.gradle.kts")
}
if $version == "" {
  $version = (get-kotlin-version-from-build-script "build.gradle")
}

if $version == "" {
  exit 1
}

$"󱈙 v($version)"
