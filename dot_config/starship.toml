[custom.git_tags]
description = "Show all tags that point at HEAD"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1 && [ -n \"$(git tag --points-at HEAD)\" ]"
command = '''
tags=$(git tag --points-at HEAD --sort=-creatordate | paste -sd ',' -)
[ -n "$tags" ] || exit 1
printf "%s" "$tags"
'''
symbol = "ΎΡΤ "
format = '\[[$symbol$output]($style)\]'
style = "yellow bold"
