let parsed = ($result.stdout | parse -r '.*?(?<version>\d+\.\d+\.\d+(?:[-+][A-Za-z0-9.]+)?)')
if (($parsed | length) == 0) {
  exit 1
}

let version = ($parsed | get 0.version | str trim)
if $version == "" {
