# Generated by ~/projects/mcp/generate-mcp.nu
# using ~/projects/mcp/mcp.toml as template

[env]
MCP_LOG_LEVEL = "debug"
SUPERGATEWAY_CMD = "npx -y supergateway"
TIME_MCP_CMD = "uvx mcp-server-time --local-timezone=Europe/Berlin"
FETCH_MCP_CMD = "uvx mcp-server-fetch"
INSPECTOR_CMD = "npx @modelcontextprotocol/inspector"
GITHUB_MCP_CMD = "sh -lc 'GITHUB_PERSONAL_ACCESS_TOKEN=op://Personal/gh-cli/token exec op run -- github-mcp-server stdio'"

[tools]
caddy = "latest"
node = "lts"
uv = "latest"
"github:github/github-mcp-server" = "latest"

[tasks.mcp-time]
description = "Use for current time and timezone conversion (e.g., Australia/Sydney, America/Sao_Paulo). (stdio -> streamableHttp via supergateway)"
run = 'npx -y supergateway --stdio "{{env.TIME_MCP_CMD}}" --outputTransport streamableHttp --port 10001 --cors'

[tasks.mcp-fetch]
description = "Use for fetching and extracting data from webpages. (stdio -> streamableHttp via supergateway)"
run = 'npx -y supergateway --stdio "{{env.FETCH_MCP_CMD}}" --outputTransport streamableHttp --port 10002 --cors'

[tasks.mcp-inspector]
description = "Interactive MCP Inspector web UI for debugging servers and tools. (direct (inferred streamableHttp))"
run = "{{env.INSPECTOR_CMD}}"

[tasks.mcp-github]
description = "Use for GitHub repository operations via MCP tools (issues, PRs, code, metadata). (stdio -> streamableHttp via supergateway)"
run = 'npx -y supergateway --stdio "{{env.GITHUB_MCP_CMD}}" --outputTransport streamableHttp --port 10003 --cors'
